name: Build Extension

permissions:
  contents: write

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Archive extension
        run: |
          cd dist
          zip -r ../chrome-website-time-tracker.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-website-time-tracker
          path: chrome-website-time-tracker.zip

      - name: Set prerelease tag
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        run: echo "RELEASE_TAG=$(date -u +'%Y-%m-%d-%H-%M')-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Upload build to prerelease
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          prerelease: true
          files: chrome-website-time-tracker.zip
