name: Build Extension

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Archive extension
        run: |
          cd dist
          zip -r ../chrome-website-time-tracker.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-website-time-tracker
          path: chrome-website-time-tracker.zip
