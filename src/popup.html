<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>サイト利用ランキング</title>
    <style>
      body {
        margin: 0;
        width: 360px;
        min-height: 420px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1220;
        color: #f7f8fc;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0 0 12px;
        color: #b6bdd6;
      }
      ol {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      li {
        --site-primary: #8ea0ff;
        display: grid;
        grid-template-columns: 28px 1fr auto;
        gap: 10px;
        align-items: center;
        background:
          radial-gradient(circle at 16px 50%, color-mix(in oklab, var(--site-primary) 45%, transparent), transparent 70%),
          #1a1f35;
        border: 1px solid color-mix(in oklab, var(--site-primary) 35%, #2b3354);
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .rank {
        color: var(--site-primary);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .site {
        min-width: 0;
      }
      .host {
        min-width: 0;
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .time {
        color: color-mix(in oklab, var(--site-primary) 60%, #fff 40%);
        font-variant-numeric: tabular-nums;
        font-weight: 700;
      }
      .empty {
        color: #9aa4cc;
        text-align: center;
        padding: 24px 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>今日のサイト利用ランキング</h1>
      <p id="date"></p>
      <ol id="ranking"></ol>
      <div id="empty" class="empty" hidden>まだ計測データがありません。</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
